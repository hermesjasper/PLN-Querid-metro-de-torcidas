post_types:
  PARTIDA:
    description: "Publicacao relacionada a jogo, pre-jogo ou chamada da partida."
    example: "Hoje tem jogo no Morumbi."
  ESCALACAO:
    description: "Divulgacao da equipe titular ou relacionados."
    example: "Escalados para a partida."
  RESULTADO:
    description: "Placar final ou parcial."
    example: "Fim de jogo: vitoria por 2 a 0."
  CONTRATACAO:
    description: "Anuncio de jogador, tecnico ou profissional."
    example: "Novo reforco chegou."
  MERCADO_DA_BOLA:
    description: "Rumores, negociacoes ou janela de transferencias."
    example: "Atualizacao sobre negociacoes."
  PATROCINIO:
    description: "Conteudo ligado a patrocinadores."
    example: "Novo parceiro oficial do clube."
  MARKETING:
    description: "Campanhas promocionais ou ativacoes."
    example: "Participe da campanha."
  NOTA_OFICIAL:
    description: "Comunicados formais do clube."
    example: "Nota oficial sobre os acontecimentos."
  INSTITUCIONAL:
    description: "Conteudo sobre historia, valores ou gestao institucional."
    example: "Aniversario do clube."
  SOCIO_TORCEDOR:
    description: "Conteudo sobre programa de socios."
    example: "Novidade para socios-torcedores."
  PRODUTO_CAMISA:
    description: "Lancamento ou venda de camisa e produtos."
    example: "Nova camisa disponivel."
  BASTIDORES:
    description: "Conteudo de treino, viagem, vestiario ou rotina interna."
    example: "Bastidores da preparacao."
  BASE:
    description: "Conteudo sobre categorias de base."
    example: "Sub-20 entra em campo."
  OUTRO:
    description: "Conteudo que nao se encaixa nas categorias anteriores."
    example: "Mensagem geral aos torcedores."

reaction_relevance:
  RELEVANTE:
    description: "Traz opiniao, avaliacao, emocao ou informacao sobre o contexto."
    example: "A escalacao ficou ofensiva, gostei."
  POUCO_INFORMATIVO:
    description: "Tem baixo conteudo analitico, mas ainda se relaciona ao post."
    example: "Vamos!"
  NAO_RELEVANTE:
    description: "Spam, texto sem relacao ou conteudo impossivel de interpretar."
    example: "Clique aqui para ganhar premio."

reaction_topics:
  ELENCO:
    description: "Comentario sobre jogadores do grupo."
    example: "O elenco precisa de mais opcoes."
  TECNICO:
    description: "Comentario sobre treinador ou comissao."
    example: "O tecnico mexeu mal."
  DIRETORIA:
    description: "Comentario sobre dirigentes e gestao."
    example: "A diretoria precisa contratar."
  ARBITRAGEM:
    description: "Comentario sobre juiz, VAR ou decisoes de arbitragem."
    example: "O VAR errou de novo."
  CONTRATACAO:
    description: "Pedido ou avaliacao de reforcos."
    example: "Esse atacante seria uma boa."
  DESEMPENHO_EM_CAMPO:
    description: "Analise de jogo, tatica ou performance."
    example: "O time marcou muito mal."
  TORCIDA:
    description: "Comentario sobre a propria torcida."
    example: "A torcida carregou o time."
  RIVALIDADE:
    description: "Provocacao ou comparacao com rivais."
    example: "O rival nao aguenta."
  PATROCINIO:
    description: "Reacao a patrocinadores."
    example: "Esse patrocinio ficou bom na camisa."
  MARKETING:
